include /etc/nginx/modules-enabled/*.conf;

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
            meta copy;

            allow publish all;
            allow play all;
        }
    }
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr info;

    server {
        listen 8080;

        location /health {
            return 200 "ok\n";
        }
    }
}
