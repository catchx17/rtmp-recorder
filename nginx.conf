include /etc/nginx/modules-enabled/*.conf;

# Keep RTMP publisher and the local ffmpeg player in the same nginx worker.
# nginx-rtmp keeps live stream state per worker unless auto-push is configured.
worker_processes 1;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
            meta copy;

            include /tmp/rtmp-recorder-notify.conf;

            allow publish all;
            allow play all;
        }
    }
}
